name: Deploy FanHub Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies and Build
        run: |
          npm install
          npm run build

      - name: Prepare Remote Directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/Home/Frontend/SP26SE130-VTUBER/
            sudo chown -R $USER:$USER /home/Home/Frontend/SP26SE130-VTUBER/
            whoami && ls -la /home/Home/Frontend/

      - name: Upload Build to VM
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          rsync -avz --delete \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            .next/ public/ package.json package-lock.json next.config.js \
            ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }}:/home/Home/Frontend/SP26SE130-VTUBER/

          rm /tmp/deploy_key

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/Home/Frontend/SP26SE130-VTUBER/
            npm install --omit=dev

            sudo $(which pm2) delete Fanhub_Vtuber || true
            sudo PORT=80 $(which pm2) start npm --name "Fanhub_Vtuber" -- start

            sudo $(which pm2) save